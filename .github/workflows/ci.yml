name: Sentinel AI CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Backend tests
        run: ./mvnw -f backend/pom.xml test

      - name: Frontend syntax
        run: node --check backend/src/main/resources/static/app.js

      - name: Demo script syntax
        run: sh -n scripts/demo.sh

      - name: Docker build
        run: docker build -t sentinel-ai:test .

  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform format
        run: terraform -chdir=infra/aws fmt -check -recursive

      - name: Terraform init without backend
        run: terraform -chdir=infra/aws init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/aws validate
