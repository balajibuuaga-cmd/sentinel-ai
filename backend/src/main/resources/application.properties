spring.application.name=sentinel-ai
server.port=${PORT:8090}
# Bind address. Left open by default so the container port mapping used by Docker
# Compose keeps working; production sets SERVER_ADDRESS=127.0.0.1 so only nginx
# on the same host can reach the app.
server.address=${SERVER_ADDRESS:0.0.0.0}
# Nginx terminates TLS and forwards over plain HTTP, so without this the app
# believes every request is http and builds absolute redirects on that scheme.
# The OAuth callback redirect then pointed at an http:// URL, exposing the
# authorization code in cleartext for the hop before nginx upgraded it.
#
# This trusts X-Forwarded-* headers, which is only safe when a proxy is the sole
# ingress. In production that holds two ways: the security group exposes 22, 80
# and 443 only, and SERVER_ADDRESS pins the listener to loopback.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
management.health.redis.enabled=${SENTINEL_REDIS_HEALTH_ENABLED:false}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:sentinelai;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
sentinel.jwt.secret=${SENTINEL_JWT_SECRET:local-dev-secret-change-me}
sentinel.auth.cognito.issuer=${SENTINEL_COGNITO_ISSUER:}
sentinel.auth.cognito.audience=${SENTINEL_COGNITO_AUDIENCE:}
sentinel.auth.cognito.client-id=${SENTINEL_COGNITO_CLIENT_ID:}
sentinel.auth.cognito.client-secret=${SENTINEL_COGNITO_CLIENT_SECRET:}
sentinel.auth.cognito.hosted-ui-base-url=${SENTINEL_COGNITO_HOSTED_UI_BASE_URL:}
sentinel.auth.cognito.redirect-uri=${SENTINEL_COGNITO_REDIRECT_URI:http://localhost:5173/auth/cognito/callback}
sentinel.auth.cognito.logout-uri=${SENTINEL_COGNITO_LOGOUT_URI:http://localhost:5173/login}
sentinel.auth.cognito.role-claim=${SENTINEL_COGNITO_ROLE_CLAIM:custom:role}
sentinel.auth.cognito.tenant-id-claim=${SENTINEL_COGNITO_TENANT_ID_CLAIM:custom:tenant_id}
sentinel.auth.cognito.organization-name-claim=${SENTINEL_COGNITO_ORGANIZATION_NAME_CLAIM:custom:organization_name}
sentinel.github.webhook-secret=${SENTINEL_GITHUB_WEBHOOK_SECRET:local-webhook-secret}
sentinel.api.enabled=${SENTINEL_API_ENABLED:true}
sentinel.worker.enabled=${SENTINEL_WORKER_ENABLED:true}
sentinel.integrations.real-exchange-enabled=${SENTINEL_INTEGRATIONS_REAL_EXCHANGE_ENABLED:false}
sentinel.integrations.token-encryption-key=${SENTINEL_INTEGRATION_TOKEN_ENCRYPTION_KEY:${sentinel.jwt.secret}}
sentinel.integrations.github.client-id=${SENTINEL_GITHUB_CLIENT_ID:}
sentinel.integrations.github.client-secret=${SENTINEL_GITHUB_CLIENT_SECRET:}
sentinel.integrations.github.redirect-uri=${SENTINEL_GITHUB_REDIRECT_URI:http://localhost:8090/integrations/github/callback}
sentinel.integrations.jira.client-id=${SENTINEL_JIRA_CLIENT_ID:}
sentinel.integrations.jira.client-secret=${SENTINEL_JIRA_CLIENT_SECRET:}
sentinel.integrations.jira.redirect-uri=${SENTINEL_JIRA_REDIRECT_URI:http://localhost:8090/integrations/jira/callback}
sentinel.integrations.jira.cloud-id=${SENTINEL_JIRA_CLOUD_ID:}
sentinel.integrations.ci.client-id=${SENTINEL_CI_CLIENT_ID:}
sentinel.integrations.ci.client-secret=${SENTINEL_CI_CLIENT_SECRET:}
sentinel.integrations.ci.redirect-uri=${SENTINEL_CI_REDIRECT_URI:http://localhost:8090/integrations/ci/callback}
sentinel.integrations.ci.authorize-url=${SENTINEL_CI_AUTHORIZE_URL:}
sentinel.integrations.ci.token-url=${SENTINEL_CI_TOKEN_URL:}
sentinel.integrations.ci.runs-url=${SENTINEL_CI_RUNS_URL:}
sentinel.ai.provider=${SENTINEL_AI_PROVIDER:deterministic}
sentinel.ai.model=${SENTINEL_AI_MODEL:deterministic-chief-engineer-v1}
sentinel.ai.external-calls-enabled=${SENTINEL_AI_EXTERNAL_CALLS_ENABLED:false}
sentinel.email.from-address=${SENTINEL_EMAIL_FROM_ADDRESS:}
sentinel.email.reset-link-base-url=${SENTINEL_EMAIL_RESET_LINK_BASE_URL:http://localhost:5173}
sentinel.security.rate-limit.requests-per-minute=${SENTINEL_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
sentinel.security.rate-limit.auth-requests-per-minute=${SENTINEL_RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:15}
sentinel.security.rate-limit.redis-enabled=${SENTINEL_REDIS_RATE_LIMIT_ENABLED:false}
spring.data.redis.host=${SENTINEL_REDIS_HOST:localhost}
spring.data.redis.port=${SENTINEL_REDIS_PORT:6379}
spring.data.redis.timeout=${SENTINEL_REDIS_TIMEOUT:500ms}
spring.data.redis.repositories.enabled=false
sentinel.integrations.health-check-delay-ms=${SENTINEL_INTEGRATION_HEALTH_CHECK_DELAY_MS:300000}
sentinel.jobs.worker-delay-ms=${SENTINEL_JOBS_WORKER_DELAY_MS:60000}
sentinel.webhooks.replay.max-attempts=${SENTINEL_WEBHOOK_REPLAY_MAX_ATTEMPTS:3}
sentinel.webhooks.replay.cooldown-seconds=${SENTINEL_WEBHOOK_REPLAY_COOLDOWN_SECONDS:300}
sentinel.webhooks.delivery.retention-days=${SENTINEL_WEBHOOK_DELIVERY_RETENTION_DAYS:30}
sentinel.webhooks.delivery.cleanup-delay-ms=${SENTINEL_WEBHOOK_DELIVERY_CLEANUP_DELAY_MS:3600000}
